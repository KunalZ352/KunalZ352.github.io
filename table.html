3,11,10.1109/TPDS.2013.282,sunw._2014,2014,IEEE Transactions on Parallel and Distributed Systems,"Verifiable privacy-preserving multi-keyword text search in the cloud supporting similarity-based ranking","With the growing popularity of cloud computing, huge amount of documents are outsourced to the cloud for reduced management cost and ease of access. Although encryption helps protecting user data confidentiality, it leaves the well-functioning yet practically-efficient secure search functions over encrypted data a challenging problem. In this paper, we present a verifiable privacy-preserving multi-keyword text search (MTS) scheme with similarity-based ranking to address this problem. To support multi-keyword search and search result ranking, we propose to build the search index based on term frequency and the vector space model with cosine similarity measure to achieve higher search result accuracy. To improve the search efficiency, we propose a tree-based index structure and various adaptive methods for multi-dimensional (MD) algorithm so that the practical search efficiency is much better than that of linear search. To further enhance the search privacy, we propose two secure index schemes to meet the stringent privacy requirements under strong threat models, i.e., known ciphertext model and known background model. In addition, we devise a scheme upon the proposed index tree structure to enable authenticity check over the returned search results. Finally, we demonstrate the effectiveness and efficiency of the proposed schemes through extensive experimental evaluation. © 2014 IEEE.",220,7,0.3824417458274012,"search, keyword, ranked, encrypted, multikeyword, index, keywords, fuzzy",
3,12,10.1145/2484313.2484322,sunw._2013,2013,"ASIA CCS 2013 - Proceedings of the 8th ACM SIGSAC Symposium on Information, Computer and Communications Security","Privacy-preserving multi-keyword text search in the cloud supporting similarity-based ranking","With the increasing popularity of cloud computing, huge amount of documents are outsourced to the cloud for reduced management cost and ease of access. Although encryption helps protecting user data confidentiality, it leaves the well-functioning yet practically-efficient secure search functions over encrypted data a challenging problem. In this paper, we present a privacy-preserving multi-keyword text search (MTS) scheme with similarity-based ranking to address this problem. To support multi-keyword search and search result ranking, we propose to build the search index based on term frequency and the vector space model with cosine similarity measure to achieve higher search result accuracy. To improve the search efficiency, we propose a tree-based index structure and various adaption methods for multi-dimensional (MD) algorithm so that the practical search efficiency is much better than that of linear search. To further enhance the search privacy, we propose two secure index schemes to meet the stringent privacy requirements under strong threat models, i.e., known ciphertext model and known background model. Finally, we demonstrate the effectiveness and efficiency of the proposed schemes through extensive experimental evaluation. © 2013 ACM.",318,7,0.3717795475406655,"search, keyword, ranked, encrypted, multikeyword, index, keywords, fuzzy",
3,13,10.1109/TPDS.2011.282,wangc._2012,2012,IEEE Transactions on Parallel and Distributed Systems,"Enabling secure and efficient ranked keyword search over outsourced cloud data","Cloud computing economically enables the paradigm of data service outsourcing. However, to protect data privacy, sensitive cloud data have to be encrypted before outsourced to the commercial public cloud, which makes effective data utilization service a very challenging task. Although traditional searchable encryption techniques allow users to securely search over encrypted data through keywords, they support only Boolean search and are not yet sufficient to meet the effective data utilization need that is inherently demanded by large number of users and huge amount of data files in cloud. In this paper, we define and solve the problem of secure ranked keyword search over encrypted cloud data. Ranked search greatly enhances system usability by enabling search result relevance ranking instead of sending undifferentiated results, and further ensures the file retrieval accuracy. Specifically, we explore the statistical measure approach, i.e., relevance score, from information retrieval to build a secure searchable index, and develop a one-to-many order-preserving mapping technique to properly protect those sensitive score information. The resulting design is able to facilitate efficient server-side ranking without losing keyword privacy. Thorough analysis shows that our proposed solution enjoys as-strong-as-possible security guarantee compared to previous searchable encryption schemes, while correctly realizing the goal of ranked keyword search. Extensive experimental results demonstrate the efficiency of the proposed solution. © 2012 IEEE.",497,7,1.0,"search, keyword, ranked, encrypted, multikeyword, index, keywords, fuzzy",
3,14,10.1109/ICDCS.2010.34,wangc._2010,2010,Proceedings - International Conference on Distributed Computing Systems,"Secure ranked keyword search over encrypted cloud data","As Cloud Computing becomes prevalent, sensitive information are being increasingly centralized into the cloud. For the protection of data privacy, sensitive data has to be encrypted before outsourcing, which makes effective data utilization a very challenging task. Although traditional searchable encryption schemes allow users to securely search over encrypted data through keywords, these techniques support only boolean search, without capturing any relevance of data files. This approach suffers from two main drawbacks when directly applied in the context of Cloud Computing. On the one hand, users, who do not necessarily have pre-knowledge of the encrypted cloud data, have to postprocess every retrieved file in order to find ones most matching their interest; On the other hand, invariably retrieving all files containing the queried keyword further incurs unnecessary network traffic, which is absolutely undesirable in today's pay-as-you-use cloud paradigm. In this paper, for the first time we define and solve the problem of effective yet secure ranked keyword search over encrypted cloud data. Ranked search greatly enhances system usability by returning the matching files in a ranked order regarding to certain relevance criteria (e.g., keyword frequency), thus making one step closer towards practical deployment of privacy-preserving data hosting services in Cloud Computing. We first give a straightforward yet ideal construction of ranked keyword search under the state-of-the-art searchable symmetric encryption (SSE) security definition, and demonstrate its inefficiency. To achieve more practical performance, we then propose a definition for ranked searchable symmetric encryption, and give an efficient design by properly utilizing the existing cryptographic primitive, order-preserving symmetric encryption (OPSE). Thorough analysis shows that our proposed solution enjoys ""as-strong-as- possible"" security guarantee compared to previous SSE schemes, while correctly realizing the goal of ranked keyword search. Extensive experimental results demonstrate the efficiency of the proposed solution. © 2010 IEEE.",645,7,1.0,"search, keyword, ranked, encrypted, multikeyword, index, keywords, fuzzy",
3,15,10.1109/INFCOM.2010.5462196,lij._2010,2010,Proceedings - IEEE INFOCOM,"Fuzzy keyword search over encrypted data in cloud computing","As Cloud Computing becomes prevalent, more and more sensitive information are being centralized into the cloud. For the protection of data privacy, sensitive data usually have to be encrypted before outsourcing, which makes effective data utilization a very challenging task. Although traditional searchable encryption schemes allow a user to securely search over encrypted data through keywords and selectively retrieve files of interest, these techniques support only exact keyword search. That is, there is no tolerance of minor typos and format inconsistencies which, on the other hand, are typical user searching behavior and happen very frequently. This significant drawback makes existing techniques unsuitable in Cloud Computing as it greatly affects system usability, rendering user searching experiences very frustrating and system efficacy very low. In this paper, for the first time we formalize and solve the problem of effective fuzzy keyword search over encrypted cloud data while maintaining keyword privacy. Fuzzy keyword search greatly enhances system usability by returning the matching files when users' searching inputs exactly match the predefined keywords or the closest possible matching files based on keyword similarity semantics, when exact match fails. In our solution, we exploit edit distance to quantify keywords similarity and develop an advanced technique on constructing fuzzy keyword sets, which greatly reduces the storage and representation overheads. Through rigorous security analysis, we show that our proposed solution is secure and privacy-preserving, while correctly realizing the goal of fuzzy keyword search. ©2010 IEEE.",941,7,1.0,"search, keyword, ranked, encrypted, multikeyword, index, keywords, fuzzy"`;

        // ----- simple CSV parser (handles quotes and commas inside fields) -----
        function parseCSVToArray(csvString) {
            const rows = [];
            let inQuote = false;
            let currentRow = [];
            let currentField = '';
            
            for (let i = 0; i < csvString.length; i++) {
                const ch = csvString[i];
                const nextCh = csvString[i+1];
                
                if (ch === '"') {
                    if (inQuote && nextCh === '"') {
                        currentField += '"';
                        i++; // skip next quote
                    } else {
                        inQuote = !inQuote;
                    }
                } else if (ch === ',' && !inQuote) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if (ch === '\n' && !inQuote) {
                    currentRow.push(currentField);
                    rows.push(currentRow);
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += ch;
                }
            }
            // push last field if any
            if (currentField !== '' || currentRow.length > 0) {
                currentRow.push(currentField);
                rows.push(currentRow);
            }
            return rows;
        }

        const data = parseCSVToArray(csvText);
        if (data.length === 0) {
            document.getElementById('table-body').innerHTML = '<tr><td colspan="13">No data found</td></tr>';
        } else {
            const headers = data[0];
            const rows = data.slice(1);
            
            // render headers
            const headerRow = document.getElementById('table-header');
            headerRow.innerHTML = '';
            for (let h of headers) {
                const th = document.createElement('th');
                th.textContent = h;
                headerRow.appendChild(th);
            }
            
            // render rows
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            for (let row of rows) {
                const tr = document.createElement('tr');
                // ensure each row has same number of columns as headers (pad with empty if needed)
                for (let i = 0; i < headers.length; i++) {
                    const td = document.createElement('td');
                    td.textContent = (i < row.length) ? row[i] : '';
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }
